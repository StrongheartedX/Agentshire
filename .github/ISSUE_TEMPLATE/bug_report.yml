name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: openclaw-version
    attributes:
      label: OpenClaw version
      placeholder: "e.g. 2026.3.13"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (for frontend issues)
      placeholder: "e.g. Chrome 124, Safari 17.4"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly — what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the Gateway
        2. Open the town page
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste terminal output, browser console errors, or attach screenshots.
      render: shell
